format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$java\
$kubernetes\
$terraform\
$aws\
$line_break\
$status\
$character"""

right_format = """$cmd_duration$time"""

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "

[git_status]
conflicted = "⚠ "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇡${ahead_count}⇣${behind_count} "
modified = "! "
staged = "+ "
untracked = "? "

[nodejs]
symbol = " "
detect_files = [".nvmrc", ".node-version", "package.json"]

[java]
symbol = " "
detect_files = [".sdkmanrc", "pom.xml", "build.gradle", "build.gradle.kts"]

[kubernetes]
disabled = false
symbol = "⎈ "

[terraform]
symbol = "󱁢 "

[aws]
symbol = " "

[cmd_duration]
min_time = 500
format = "[$duration]($style) "

[time]
disabled = false
format = "[$time]($style) "
time_format = "%H:%M:%S"

[status]
disabled = false
symbol = "✗ "
